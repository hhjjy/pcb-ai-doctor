services:
  yolo-train:
    image: ultralytics/ultralytics:latest
    runtime: nvidia
    shm_size: '2g'
    volumes:
      - ./dataset:/app/dataset
      - ./runs:/ultralytics/runs
      - ./data.yaml:/app/data.yaml
    working_dir: /app
    command: >
      yolo detect train
      data=data.yaml
      model=yolov8n.pt
      epochs=100
      imgsz=640
      batch=8
      project=runs
      name=train
      workers=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
